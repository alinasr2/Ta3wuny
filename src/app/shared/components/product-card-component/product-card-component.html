<div class="bg-surface rounded-2xl overflow-hidden shadow-sm border border-transparent hover:border-primary/20 transition-all hover:shadow-lg">
  <div class="relative h-48">
    <img [src]="imageUrl" class="w-full h-full object-cover" [alt]="product.name">
    <span class="absolute top-3 start-3 bg-accent text-primary-dark text-xs font-bold px-3 py-1 rounded-full border border-primary/20">
      {{ badgeText }}
    </span>
  </div>
  <div class="p-5">
    <div class="flex justify-between items-start mb-2">
      <h3 class="font-bold text-lg line-clamp-1">{{ product.name }}</h3>
      <div class="text-end">
        <span class="text-primary font-bold">{{ formattedPrice }}</span>
        <p class="text-xs text-text-secondary">/{{ product.unit || 'كجم' }}</p>
      </div>
    </div>
    
    <div class="flex items-center text-sm text-text-secondary mb-4">
      <i class="pi pi-map-marker me-1 text-error"></i>
      <span class="line-clamp-1">{{ location }}</span>
    </div>
    
    <div class="flex justify-between items-center mb-6 text-sm">
      <span class="text-text-secondary line-clamp-1">{{ farmerDisplayName }}</span>
      <span class="flex items-center">
        <i class="pi pi-star-fill text-warning me-1 text-xs"></i>
        {{ rating }}
      </span>
    </div>
    
    <button 
      [routerLink]="['/product']"
      [queryParams]="{ id: product.id }"
      class="w-full bg-primary hover:bg-primary-dark text-white py-3 rounded-xl flex items-center justify-center gap-2 transition-colors">
      <i class="pi pi-shopping-cart"></i> عرض التفاصيل
    </button>
  </div>
</div>
