<div class="min-h-screen">
  @if(role() == "loading"){
    <div class="flex items-center justify-center py-20">
      <mat-spinner [diameter]="48"></mat-spinner>
    </div>
  }
  @else if (role() == "Trader") {
    <app-trader-profile></app-trader-profile>
  }
  @else{
    <app-farmer-profile></app-farmer-profile>
  }
</div>
