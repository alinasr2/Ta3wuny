<div class="min-h-screen bg-background flex items-center justify-center p-4">
  <div class="bg-surface rounded-2xl shadow-sm w-full max-w-md p-8">

    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
          </path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-text-primary">أكمل ملفك كتاجر</h1>
      <p class="text-text-secondary mt-1">أضف بيانات نشاطك التجاري للبدء</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <div>
        <label class="block text-text-primary font-medium mb-2">اسم النشاط التجاري *</label>
        <input type="text" formControlName="businessName" placeholder="شركة النيل للتجارة"
          class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-primary bg-surface text-text-primary placeholder-text-secondary" />
        @if (form.get('businessName')?.invalid && form.get('businessName')?.touched) {
        <p class="text-error text-sm mt-1">اسم النشاط التجاري مطلوب</p>
        }
      </div>

      <div>
        <label class="block text-text-primary font-medium mb-2">نوع النشاط *</label>
        <select formControlName="businessType"
          class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-primary bg-surface text-text-primary">
          @for (type of businessTypes; track type.value) {
          <option [ngValue]="type.value">{{ type.label }}</option>
          }
        </select>
      </div>

      <div>
        <label class="block text-text-primary font-medium mb-2">
          الوصف <span class="text-text-secondary font-normal">(اختياري)</span>
        </label>
        <textarea formControlName="description" rows="3" placeholder="اكتب نبذة عن نشاطك التجاري..."
          class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-primary bg-surface text-text-primary placeholder-text-secondary resize-none">
        </textarea>
      </div>

      <div>
        <label class="block text-text-primary font-medium mb-2">
          الرقم الضريبي <span class="text-text-secondary font-normal">(اختياري)</span>
        </label>
        <input type="text" formControlName="taxNumber" placeholder="123456789"
          class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-primary bg-surface text-text-primary placeholder-text-secondary" />
      </div>

      @if (error()) {
      <div class="bg-red-50 border border-red-200 rounded-xl p-3 text-red-600 text-sm">
        {{ error() }}
      </div>
      }

      <button type="submit" [disabled]="form.invalid || loading()"
        class="w-full bg-primary text-text-on-primary py-3 rounded-xl font-semibold hover:bg-primary-dark transition-all disabled:opacity-50">
        @if (loading()) {
        <span
          class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full me-2"></span>
        }
        حفظ وإكمال
      </button>
    </form>
  </div>
</div>
