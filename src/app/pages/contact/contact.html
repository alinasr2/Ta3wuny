<div class="bg-background text-text-primary">
  <section class="bg-primary-dark py-20 text-center text-white relative overflow-hidden">
    <div class="absolute top-0 start-0 w-32 h-32 bg-primary-light/10 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 end-0 w-64 h-64 bg-accent/5 rounded-full translate-x-1/4 translate-y-1/4"></div>
    
    <div class="container ">
      <h1 class="text-4xl md:text-5xl font-bold mb-4">تواصل معنا</h1>
      <p class="text-accent max-w-2xl mx-auto text-lg">
        نحن هنا للمساعدة! سواء كان لديك سؤال حول سوقنا، أو الزراعة العضوية، أو فقط تريد إلقاء التحية، يسعدنا سماع رأيك.
      </p>
    </div>
  </section>

  <div class="container py-10">
    <div class="grid lg:grid-cols-3 gap-8">
      <div class="lg:col-span-1 space-y-6">
        <div class="bg-surface p-6 rounded-2xl shadow-sm border-b-4 border-primary group hover:bg-surface-hover transition-all">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-accent rounded-xl flex items-center justify-center text-primary text-xl">
              <i class="pi pi-phone"></i>
            </div>
            <div>
              <p class="text-text-secondary text-sm">اتصل بنا</p>
              <p class="font-bold text-lg">+20 123 456 789</p>
            </div>
          </div>
        </div>

        <div class="bg-surface p-6 rounded-2xl shadow-sm border-b-4 border-secondary group hover:bg-surface-hover transition-all">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-secondary-light/30 rounded-xl flex items-center justify-center text-secondary-dark text-xl">
              <i class="pi pi-envelope"></i>
            </div>
            <div>
              <p class="text-text-secondary text-sm">الدعم عبر البريد الإلكتروني</p>
              <p class="font-bold text-lg">support@market.com</p>
            </div>
          </div>
        </div>

        <div class="bg-surface p-6 rounded-2xl shadow-sm border-b-4 border-primary group hover:bg-surface-hover transition-all">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-accent rounded-xl flex items-center justify-center text-primary text-xl">
              <i class="pi pi-map-marker"></i>
            </div>
            <div>
              <p class="text-text-secondary text-sm">موقعنا</p>
              <p class="font-bold text-lg">الجيزة، مصر</p>
            </div>
          </div>
        </div>

        <div class="bg-text-primary p-6 rounded-2xl text-white">
          <p class="mb-4 font-semibold">تابع تحديثاتنا</p>
          <div class="flex gap-4">
            <a href="#" class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center hover:bg-primary transition-colors"><i class="pi pi-facebook"></i></a>
            <a href="#" class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center hover:bg-primary transition-colors"><i class="pi pi-instagram"></i></a>
            <a href="#" class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center hover:bg-primary transition-colors"><i class="pi pi-twitter"></i></a>
          </div>
        </div>
      </div>

      <div class="lg:col-span-2 bg-surface p-8 md:p-12 rounded-3xl shadow-xl border border-accent/50">
        <h2 class="text-2xl font-bold mb-8 flex items-center gap-3">
           أرسل لنا رسالة <i class="pi pi-send text-primary"></i>
        </h2>
        
        <form class="space-y-6">
          <div class="grid md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-bold text-text-secondary">الاسم الكامل</label>
              <div class="relative">
                <i class="pi pi-user absolute start-4 top-1/2 -translate-y-1/2 text-text-secondary/50"></i>
                <input type="text" placeholder="أحمد محمد" 
                       class="w-full ps-11 pe-4 py-3 bg-background border border-accent rounded-xl outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all">
              </div>
            </div>
            <div class="space-y-2">
              <label class="text-sm font-bold text-text-secondary">البريد الإلكتروني</label>
              <div class="relative">
                <i class="pi pi-envelope absolute start-4 top-1/2 -translate-y-1/2 text-text-secondary/50"></i>
                <input type="email" placeholder="example@mail.com" 
                       class="w-full ps-11 pe-4 py-3 bg-background border border-accent rounded-xl outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all">
              </div>
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-sm font-bold text-text-secondary">الموضوع</label>
            <select class="w-full px-4 py-3 bg-background border border-accent rounded-xl outline-none focus:border-primary transition-all appearance-none cursor-pointer">
              <option>استفسار عام</option>
              <option>دعم الطلبات</option>
              <option>شراكة المزارعين</option>
              <option>مشكلة فنية</option>
            </select>
          </div>

          <div class="space-y-2">
            <label class="text-sm font-bold text-text-secondary">رسالتك</label>
            <textarea rows="5" placeholder="كيف يمكننا مساعدتك؟" 
                      class="w-full px-4 py-3 bg-background border border-accent rounded-xl outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all resize-none"></textarea>
          </div>

          <button type="submit" 
                  class="w-full md:w-fit px-12 py-4 bg-primary hover:bg-primary-dark text-white font-bold rounded-xl shadow-lg shadow-primary/20 transition-all transform hover:-translate-y-1 flex items-center justify-center gap-3">
            إرسال الرسالة <i class="pi pi-arrow-end"></i>
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
